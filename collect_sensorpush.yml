name: Collect SensorPush readings

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary

      - name: Collect latest SensorPush readings
        env:
          SENSORPUSH_EMAIL: ${{ secrets.SENSORPUSH_EMAIL }}
          SENSORPUSH_PASSWORD: ${{ secrets.SENSORPUSH_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENSORPUSH_POLL_LIMIT: ${{ secrets.SENSORPUSH_POLL_LIMIT }}
        run: python collect_latest_supabase.py
